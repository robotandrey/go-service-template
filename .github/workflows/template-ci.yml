name: template-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  scaffold-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: grpc-only
            target_dir: ./_generated/grpc
            service_name: grpc-svc
            module_path: example.com/grpc-svc
            http_enabled: "false"
            grpc_enabled: "true"
            extra_flags: ""
          - profile: http-only
            target_dir: ./_generated/http
            service_name: http-svc
            module_path: example.com/http-svc
            http_enabled: "true"
            grpc_enabled: "false"
            extra_flags: ""
          - profile: dual
            target_dir: ./_generated/dual
            service_name: dual-svc
            module_path: example.com/dual-svc
            http_enabled: "true"
            grpc_enabled: "true"
            extra_flags: ""
          - profile: full
            target_dir: ./_generated/full
            service_name: full-svc
            module_path: example.com/full-svc
            http_enabled: "true"
            grpc_enabled: "true"
            extra_flags: "PG_ENABLED=true KAFKA_ENABLED=true KAFKA_PRODUCER_ENABLED=true KAFKA_CONSUMER_ENABLED=true DOCKER_ENABLED=true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Install copier
        run: pipx install copier

      - name: Generate profile
        run: |
          make service \
            TARGET_DIR=${{ matrix.target_dir }} \
            SERVICE_NAME=${{ matrix.service_name }} \
            MODULE_PATH=${{ matrix.module_path }} \
            HTTP_ENABLED=${{ matrix.http_enabled }} \
            GRPC_ENABLED=${{ matrix.grpc_enabled }} \
            ${{ matrix.extra_flags }}

      - name: Build checks
        run: |
          set -euo pipefail
          cd ${{ matrix.target_dir }}

          make generate
          make mocks
          make lint
          make test
          make build

          PB_BASE="internal/pb/${{ matrix.module_path }}"
          test -d "$PB_BASE"
          test -f "$PB_BASE/openapi/swagger.json"
          python -m json.tool "$PB_BASE/openapi/swagger.json" >/dev/null
          test -f test/mock/internal/app/ping/service_mock.go

          if [ "${{ matrix.grpc_enabled }}" = "true" ]; then
            test -d "$PB_BASE/api/${{ matrix.service_name }}"
            test ! -d .deploy/openapi
          else
            test -f .deploy/openapi/http.swagger.json
          fi

      - name: Runtime docs smoke
        run: |
          set -euo pipefail
          cd ${{ matrix.target_dir }}

          make run > service.log 2>&1 &
          pid=$!
          trap 'kill "$pid" >/dev/null 2>&1 || true' EXIT

          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8081/swagger.json >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:8081/docs >/dev/null
          curl -fsS http://127.0.0.1:8081/swagger.json >/dev/null
          curl -fsS http://127.0.0.1:8081/openapi/swagger.json >/dev/null

          if [ "${{ matrix.grpc_enabled }}" = "true" ]; then
            curl -fsS -X POST "http://127.0.0.1:8081/v1/ping" \
              -H 'content-type: application/json' \
              -d '{"forceError":""}' >/dev/null

            timeout 2 bash -c '</dev/tcp/127.0.0.1/9090'
          fi

          if [ "${{ matrix.http_enabled }}" = "true" ]; then
            curl -fsS http://127.0.0.1:8080/v1/ping >/dev/null
          fi

          if grep -q "Failed to extract ServerMetadata from context" service.log; then
            echo "unexpected grpc-gateway metadata log noise"
            cat service.log
            exit 1
          fi

      - name: Validate compose config when present
        run: |
          cd ${{ matrix.target_dir }}
          if [ -f .deploy/docker/docker-compose.yml ]; then
            docker compose -f .deploy/docker/docker-compose.yml config >/dev/null
          fi
